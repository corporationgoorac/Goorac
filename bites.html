<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Quantum Bites</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #00d2ff;
            --danger: #ff4444;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; 
            overflow: hidden; 
        }

        header {
            position: fixed; top: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: max(15px, env(safe-area-inset-top)) 20px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; pointer-events: none;
        }
        .header-title { 
            font-size: 1.5rem; font-weight: 900; letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); pointer-events: auto;
        }
        .search-icon-btn {
            color: #fff; font-size: 30px; cursor: pointer; pointer-events: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: transform 0.2s;
        }
        .search-icon-btn:active { transform: scale(0.85); color: var(--accent); }

        #bites-feed-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
            background: var(--bg);
        }
        #bites-feed-container::-webkit-scrollbar { display: none; }

        .bite-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px; 
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            background-size: cover; background-position: center;
            background-color: #050505;
            border-bottom: 1px solid var(--border);
        }
        .bite-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%);
            z-index: 1; pointer-events: none;
        }
        
        .bite-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        
        .bite-info { flex: 1; padding-right: 15px; }
        .source-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .source-pfp { 
            width: 40px; height: 40px; border-radius: 12px; 
            background: #222; object-fit: cover; border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; color: var(--accent);
        }
        .source-name { font-weight: 800; font-size: 1.05rem; color: #fff; }
        .bite-time { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; margin-top: 2px;}
        
        .bite-caption { font-size: 0.95rem; line-height: 1.4; color: #f0f0f0; margin-bottom: 8px;}
        .bite-tag { 
            background: rgba(0, 210, 255, 0.15); color: var(--accent); 
            padding: 4px 10px; border-radius: 12px; font-weight: 700; 
            display: inline-block; font-size: 0.75rem; border: 1px solid rgba(0, 210, 255, 0.3);
        }

        .bite-actions { display: flex; flex-direction: column; gap: 22px; align-items: center; padding-bottom: 5px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff; cursor: pointer; }
        .action-btn .material-icons-round { font-size: 34px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); transition: 0.2s; }
        .action-btn:active .material-icons-round { transform: scale(0.7); }
        .action-btn.liked .material-icons-round { color: var(--danger); }
        .action-label { font-size: 0.75rem; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        #search-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 10001;
            transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateX(0); }
        
        .search-header {
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .back-btn { color: #fff; font-size: 28px; cursor: pointer; }
        .search-input {
            flex: 1; background: #111; border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 14px; color: white; outline: none;
            font-size: 16px;
        }

        .skeleton-card { background: #080808; animation: pulse 1.5s infinite; }
        .skel-box { background: #222; border-radius: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .loading-spinner { text-align: center; padding: 20px; color: var(--accent); animation: pulse 1s infinite; }
        
        main-navbar { z-index: 10000; position: relative; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="openSearch()">search</span>
</header>

<div id="bites-feed-container">
    <script>
        const cachedBites = localStorage.getItem('goorac_bites_cache');
        if (cachedBites) document.write(cachedBites);
        else document.write('<div class="bite-card skeleton-card"><div class="bite-overlay"></div></div>');
    </script>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round back-btn" onclick="closeSearch()">arrow_back</span>
        <input type="text" class="search-input" id="bite-search-box" placeholder="Search internet, songs, news..." autocomplete="off">
    </div>
    <div class="search-results" id="search-results-container"></div>
</div>

<script>
    // --- 1. FIREBASE & ML INIT ---
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let myUid = null;
    let userInterests = {}; 
    let seenBites = new Set(); 
    let isFetching = false;
    let viewTimers = {}; 

    const DEFAULT_TOPICS = ["World News", "Technology", "Sports", "Nature"];

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            myUid = user.uid;
            await loadProfile();
            initEngine();
        } else window.location.href = "login.html";
    });

    async function loadProfile() {
        const doc = await db.collection("users").doc(myUid).get();
        if(doc.exists && doc.data().bitesProfile) userInterests = doc.data().bitesProfile;
    }

    function updateScore(topic, points) {
        if (!myUid || !topic) return;
        const tag = topic.toLowerCase().trim();
        userInterests[tag] = (userInterests[tag] || 0) + points;
        db.collection("users").doc(myUid).update({
            [`bitesProfile.${tag}`]: firebase.firestore.FieldValue.increment(points)
        }).catch(() => {
            db.collection("users").doc(myUid).set({ bitesProfile: { [tag]: points } }, { merge: true });
        });
    }

    // --- 2. THE RSS FETCH ENGINE ---
    async function fetchFromInternet(topic, limit = 10) {
        try {
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(topic)}&hl=en-IN&gl=IN&ceid=IN:en`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            const response = await fetch(apiUrl);
            const json = await response.json();
            if (json.status !== "ok") return [];

            return json.items.map(b => {
                let img = b.enclosure?.link || '';
                if (!img && b.description) {
                    const match = b.description.match(/src="([^"]+)"/);
                    if (match) img = match[1];
                }
                return {
                    id: b.guid || Math.random().toString(36).substr(2,9),
                    category: topic,
                    source: b.source || "News",
                    title: b.title.split(' - ')[0],
                    imgUrl: img || `https://picsum.photos/seed/${Math.random()}/1080/1920`,
                    likes: Math.floor(Math.random() * 500) + 50,
                    timestamp: new Date(b.pubDate).getTime(),
                    link: b.link
                };
            });
        } catch { return []; }
    }

    // --- 3. THE ML FEED GENERATOR ---
    async function fetchNextBatch() {
        if (isFetching) return;
        isFetching = true;
        
        let topics = [];
        let sortedInts = Object.entries(userInterests).sort((a,b) => b[1] - a[1]);
        
        if (sortedInts.length === 0) topics = DEFAULT_TOPICS;
        else {
            topics.push(sortedInts[0][0]); // Top interest
            if(sortedInts[1]) topics.push(sortedInts[1][0]); 
            topics.push(DEFAULT_TOPICS[Math.floor(Math.random() * DEFAULT_TOPICS.length)]); // Exploration
        }

        const promises = topics.map(t => fetchFromInternet(t, 5));
        const results = (await Promise.all(promises)).flat();
        
        const filtered = results.filter(b => !seenBites.has(b.id));
        filtered.forEach(b => seenBites.add(b.id));
        filtered.sort(() => Math.random() - 0.5);
        
        if(filtered.length > 0) appendBites(filtered);
        isFetching = false;
    }

    function appendBites(bites) {
        const container = document.getElementById('bites-feed-container');
        if(container.querySelector('.skeleton-card')) container.innerHTML = '';

        bites.forEach((b, i) => {
            const el = document.createElement('div');
            el.className = 'bite-card';
            el.style.backgroundImage = `url('${b.imgUrl}')`;
            el.dataset.id = b.id;
            el.dataset.category = b.category;
            
            el.innerHTML = `
                <div class="bite-overlay"></div>
                <div class="bite-content">
                    <div class="bite-info">
                        <div class="source-row">
                            <div class="source-pfp">${b.source.charAt(0)}</div>
                            <span class="source-name">${b.source}</span>
                        </div>
                        <div class="bite-caption">${b.title}</div>
                        <div class="bite-tag">#${b.category}</div>
                    </div>
                    <div class="bite-actions">
                        <div class="action-btn" onclick="handleLike(this, '${b.category}')">
                            <span class="material-icons-round">favorite_border</span>
                            <span class="action-label">${b.likes}</span>
                        </div>
                        <div class="action-btn" onclick="window.open('${b.link}', '_blank')">
                            <span class="material-icons-round">open_in_browser</span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(el);
            mlObserver.observe(el);
            if (i === bites.length - 2) infiniteObserver.observe(el);
        });
        localStorage.setItem('goorac_bites_cache', container.innerHTML);
    }

    // --- 4. OBSERVERS ---
    const mlObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                viewTimers[e.target.dataset.id] = setTimeout(() => {
                    updateScore(e.target.dataset.category, 1);
                }, 5000); // 5-second watch rule
            } else clearTimeout(viewTimers[e.target.dataset.id]);
        });
    }, { threshold: 0.8 });

    const infiniteObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                infiniteObserver.unobserve(e.target);
                fetchNextBatch();
            }
        });
    }, { rootMargin: "800px" });

    function initEngine() {
        const hasSkel = document.getElementById('bites-feed-container').querySelector('.skeleton-card');
        if (hasSkel) fetchNextBatch();
        else {
            setTimeout(fetchNextBatch, 1000);
            document.querySelectorAll('.bite-card').forEach(c => mlObserver.observe(c));
        }
    }

    // --- 5. SEARCH & UI ---
    function handleLike(btn, cat) {
        btn.classList.toggle('liked');
        const icon = btn.querySelector('.material-icons-round');
        icon.innerText = btn.classList.contains('liked') ? 'favorite' : 'favorite_border';
        if(btn.classList.contains('liked')) updateScore(cat, 5); // Likes give +5 weight
    }

    function openSearch() { document.getElementById('search-modal').classList.add('active'); }
    function closeSearch() { document.getElementById('search-modal').classList.remove('active'); }

    document.getElementById('bite-search-box').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const q = e.target.value.trim();
            if(!q) return;
            updateScore(q, 10); // Search gives +10 weight
            const container = document.getElementById('search-results-container');
            container.innerHTML = '<div class="loading-spinner">Searching Quantum...</div>';
            const res = await fetchFromInternet(q, 10);
            container.innerHTML = '';
            res.forEach(item => {
                const card = document.createElement('div');
                card.style.padding = '15px';
                card.innerHTML = `<div style="font-weight:700;">${item.title}</div><div style="font-size:0.8rem;color:grey;">${item.source}</div>`;
                card.onclick = () => { closeSearch(); appendBites([item]); window.scrollTo(0,0); };
                container.appendChild(card);
            });
        }
    });

    window.onload = initEngine;
</script>

</body>
</html>
