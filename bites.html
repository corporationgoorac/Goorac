<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Goorac | Bites</title>
    
    <script src="config.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script type="module" src="components/presence.js"></script>
    <script src="components/navbar.js" defer></script>
    
    <script src="https://www.youtube.com/iframe_api"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        /* ==========================================================================
           GLOBAL RESET & STRICT THEME LOCK
           ========================================================================== */
        * { box-sizing: border-box !important; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #000;
            --accent: #00d2ff;
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #888;
            --danger: #ff4444;
            --glass: rgba(0, 0, 0, 0.4);
            --text-main: #ffffff;
            --nav-height: calc(65px + env(safe-area-inset-bottom)); /* Dynamic Navbar Height */
        }

        body, html {
            background: var(--bg); color: white; margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; /* STRICT LOCK FOR REELS FEED */
            width: 100vw; height: 100vh;
            overscroll-behavior: none; /* Prevents iOS bounce */
        }

        /* ==========================================================================
           HEADER (TRANSPARENT FLOATING)
           ========================================================================== */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            padding-top: max(15px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            pointer-events: none; 
        }
        .header-title { font-weight: 900; font-size: 1.5rem; color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.8); pointer-events: auto; letter-spacing: -0.5px; }
        .header-right { pointer-events: auto; }
        
        .search-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.25);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .search-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.3); }

        /* ==========================================================================
           THE VIRTUAL SWIPER ENGINE (PIXEL-PERFECT CSS SNAP)
           ========================================================================== */
        #bites-viewport {
            position: absolute; top: 0; left: 0; width: 100vw; 
            /* EXACT HEIGHT Calculation: Full Screen minus Navbar */
            height: calc(100vh - var(--nav-height)); 
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            z-index: 10;
        }
        #bites-viewport::-webkit-scrollbar { display: none; }

        .bite-slide {
            width: 100vw; 
            height: 100%; /* Matches Viewport Height Exactly */
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative;
        }

        /* THE HARDWARE PLAYERS (FIXED BEHIND SCROLL) */
        .yt-player-container {
            position: fixed; top: 0; left: 0; width: 100vw; 
            height: calc(100vh - var(--nav-height));
            z-index: 1; opacity: 0; pointer-events: none; background: #000;
            transform: scale(1.05); /* Hide YouTube embedded black bars */
            transition: opacity 0.1s linear;
        }
        .yt-player-container.active { opacity: 1; z-index: 2; }
        .yt-iframe { width: 100%; height: 100%; pointer-events: none; border: none; }

        /* ==========================================================================
           BITES UI OVERLAY (Tiktok Style - Perfectly Aligned)
           ========================================================================== */
        .bite-ui-layer {
            position: absolute; inset: 0; z-index: 20;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15px 20px; 
            /* Bottom padding ensures text sits elegantly above the navbar cut-off */
            padding-bottom: 25px; 
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 30%, transparent 50%);
        }

        .side-actions {
            position: absolute; right: 15px; 
            bottom: 25px; /* Aligned with text bottom */
            display: flex; flex-direction: column; gap: 28px; align-items: center;
        }

        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #fff; cursor: pointer; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8)); transition: transform 0.2s;}
        .action-btn:active { transform: scale(0.8); }
        .action-btn .material-icons-round { font-size: 36px; }
        .action-btn span.count { font-size: 0.8rem; font-weight: 800; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }
        
        .action-btn.liked .material-icons-round { color: var(--danger); animation: heartPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.5) rotate(-10deg); } 100% { transform: scale(1) rotate(0deg); } }

        .creator-pfp-wrap { position: relative; width: 48px; height: 48px; margin-bottom: 15px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
        .creator-pfp { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; object-fit: cover; background: #222; }
        .follow-badge {
            position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900;
            border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .bottom-info { max-width: 78%; display: flex; flex-direction: column; justify-content: flex-end; }
        .bite-author { font-size: 1.05rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-shadow: 0 2px 5px rgba(0,0,0,1); display: flex; align-items: center; gap: 6px; }
        .bite-desc { font-size: 0.95rem; color: #f0f0f0; line-height: 1.4; text-shadow: 0 2px 5px rgba(0,0,0,1); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-weight: 500; }

        /* ==========================================================================
           ADVANCED UI FEEDBACK & LOADERS
           ========================================================================== */
        .play-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 80px; height: 80px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff; border: 1px solid rgba(255,255,255,0.2);
            opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 30; pointer-events: none;
        }
        .play-indicator .material-icons-round { font-size: 46px; }
        .play-indicator.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        /* Smooth Fetching Pill */
        #feed-loading-pill {
            position: fixed; bottom: calc(var(--nav-height) + 20px); left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; gap: 12px;
            color: #fff; font-size: 0.85rem; font-weight: 700; z-index: 100;
            opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #feed-loading-pill.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .circular-loader { width: 18px; height: 18px; border: 2px solid rgba(0, 210, 255, 0.2); border-top-color: var(--accent); border-radius: 50%; animation: spinLoader 0.8s linear infinite; }
        @keyframes spinLoader { to { transform: rotate(360deg); } }

        /* ==========================================================================
           SEARCH DISCOVER MODAL (Instagram Style)
           ========================================================================== */
        #discover-modal {
            position: fixed; top: 0; right: -100%; width: 100vw; height: 100vh;
            background: #000; z-index: 2000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #discover-modal.active { right: 0; }

        .modal-header {
            padding: 15px 20px; padding-top: max(15px, env(safe-area-inset-top));
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1a1a1a; background: #050505;
        }
        .back-btn { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; padding: 0; }
        .search-input-box {
            flex: 1; background: #161616; border: 1px solid #222; padding: 12px 18px;
            border-radius: 16px; color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        .search-input-box:focus { border-color: var(--accent); background: #1a1a1a; box-shadow: 0 0 10px rgba(0,210,255,0.1); }

        .grid-results {
            flex: 1; overflow-y: auto; padding: 2px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; align-content: start;
        }

        .grid-item { aspect-ratio: 9 / 16; background: #111; position: relative; cursor: pointer; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .grid-item:active img { transform: scale(1.08); filter: brightness(0.7); }
        .grid-item .views-overlay {
            position: absolute; bottom: 6px; left: 6px; font-size: 0.75rem; font-weight: 800; color: #fff;
            display: flex; align-items: center; gap: 3px; text-shadow: 0 2px 4px #000; z-index: 2;
        }
        .grid-item::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:40%; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index: 1; }

        .skel-grid-item { aspect-ratio: 9 / 16; background: #161616; animation: skelPulse 1.5s infinite; }
        @keyframes skelPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* TAP TO START SCREEN */
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); transition: opacity 0.4s ease;
        }
        .start-btn-pulse { width: 90px; height: 90px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px var(--accent); animation: startPulse 2s infinite; margin-bottom: 25px; color: #000; }
        @keyframes startPulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.8); } 70% { box-shadow: 0 0 0 25px rgba(0, 210, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); } }

        /* 🚀 MAIN NAVBAR */
        main-navbar { 
            display: block; position: fixed; bottom: 0; left: 0; width: 100%;
            height: var(--nav-height); background-color: var(--bg); z-index: 1000; 
        }
    </style>
</head>
<body>

<div id="start-screen" onclick="initExperience()">
    <div class="start-btn-pulse"><span class="material-icons-round" style="font-size:46px; margin-left:4px;">play_arrow</span></div>
    <h2 style="margin:0; font-weight:900; font-size:1.8rem; letter-spacing:-0.5px;">Enter Bites</h2>
    <p style="color:#aaa; font-size:0.95rem; margin-top:12px; font-weight:600;">Turn your volume up</p>
</div>

<header>
    <div class="header-title">Bites</div>
    <div class="header-right">
        <div class="search-btn" onclick="openDiscoverModal()">
            <span class="material-icons-round" style="font-size:24px;">search</span>
        </div>
    </div>
</header>

<div id="player-container-a" class="yt-player-container active"><div id="yt-player-a" class="yt-iframe"></div></div>
<div id="player-container-b" class="yt-player-container"><div id="yt-player-b" class="yt-iframe"></div></div>

<div class="play-indicator" id="play-pause-icon"><span class="material-icons-round" id="pp-icon-inner">pause</span></div>

<div id="feed-loading-pill">
    <div class="circular-loader"></div>
    <span>Decrypting new Bites...</span>
</div>

<div id="bites-viewport" onscroll="handleScroll()">
    </div>

<div id="discover-modal">
    <div class="modal-header">
        <button class="back-btn" onclick="closeDiscoverModal(true)"><span class="material-icons-round">west</span></button>
        <input type="text" id="search-input" class="search-input-box" placeholder="Search trending topics..." autocomplete="off">
    </div>
    <div class="grid-results" id="search-grid">
        <div style="grid-column: 1 / -1; text-align:center; padding: 60px 20px; color: #555;">
            <span class="material-icons-round" style="font-size: 60px; opacity:0.3; margin-bottom: 15px;">explore</span>
            <p style="font-weight:700; font-size:1.2rem; color:#888;">Discover New Bites</p>
            <p style="font-size:0.9rem; margin-top:8px;">Search for gaming, comedy, tech, and more.</p>
        </div>
    </div>
</div>

<main-navbar></main-navbar>

<script>
    // ==========================================================================
    // SYSTEM, FIREBASE & ADVANCED ALGORITHM INIT
    // ==========================================================================
    if (typeof window.initFirebaseCore === 'function') window.initFirebaseCore();
    else if (!firebase.apps.length && window.firebaseConfig) firebase.initializeApp(window.firebaseConfig);

    const db = firebase.firestore();
    const auth = firebase.auth();
    let myUid = null;
    let myInterests = ["tamil"]; // Global Default

    // 🚀 BATCHING ENGINE: Prevents Firebase overload & limits cost
    let pendingAlgorithmUpdates = {};
    let syncInterval = null;

    auth.onAuthStateChanged(user => {
        if (user) { 
            myUid = user.uid; 
            
            // Fetch top 5 interests from DB
            db.collection("users").doc(myUid).get().then(doc => {
                if(doc.exists && doc.data().interests) {
                    const ints = doc.data().interests;
                    myInterests = Object.keys(ints).sort((a,b) => ints[b] - ints[a]).slice(0, 5);
                    if(myInterests.length === 0) myInterests = ["tamil"]; 
                }
            });

            // Start background sync engine
            syncInterval = setInterval(flushAlgorithmUpdates, 10000); // Sync every 10s
        } 
        else { window.location.href = 'login.html'; }
    });

    // Ensure data is saved if user closes app suddenly
    window.addEventListener('beforeunload', flushAlgorithmUpdates);
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) flushAlgorithmUpdates();
    });

    // ==========================================================================
    // THE BITES ENGINE (STATE, MEMORY & CACHE)
    // ==========================================================================
    let bitesQueue = [];
    let currentIndex = 0;
    let isFetching = false;
    let hasStarted = false;
    let viewedVideoIds = new Set(); 
    
    // 🚀 200-BITE PERMANENT MEMORY BANK
    let bitesHistory = JSON.parse(localStorage.getItem('goorac_bites_history') || '[]');
    
    // 🚀 TIME TRACKING VARIABLES
    let slideStartTime = 0;
    let watchTimer = null; 

    // Backup State for Temporary Search Mode
    let backupQueue = [];
    let backupIndex = 0;
    let isSearchPlaying = false;

    // The Dual Hardware Players
    let playerA, playerB;
    let activePlayer = 'A'; 
    let playersReady = 0;

    // Load from Cache immediately
    (function loadCache() {
        const cached = localStorage.getItem('goorac_bites_queue');
        if (cached) {
            try { 
                const parsed = JSON.parse(cached);
                if (parsed.length > 0) bitesQueue = parsed; 
            } catch(e) {}
        }
    })();

    // ==========================================================================
    // YOUTUBE IFRAME API SETUP (Optimized Parameters)
    // ==========================================================================
    function onYouTubeIframeAPIReady() {
        const playerVars = { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'mute': 0, 'iv_load_policy': 3 };
        
        playerA = new YT.Player('yt-player-a', {
            playerVars: playerVars,
            events: { 'onReady': () => checkPlayersReady(), 'onStateChange': onPlayerStateChange }
        });
        
        playerB = new YT.Player('yt-player-b', {
            playerVars: playerVars,
            events: { 'onReady': () => checkPlayersReady(), 'onStateChange': onPlayerStateChange }
        });
    }

    function checkPlayersReady() {
        playersReady++;
        if (playersReady === 2 && bitesQueue.length > 0) {
            playerA.cueVideoById(bitesQueue[0].videoId);
            if(bitesQueue.length > 1) playerB.cueVideoById(bitesQueue[1].videoId);
            renderDOMSlides();
        } else if (playersReady === 2 && bitesQueue.length === 0) {
            fetchMoreBites(); 
        }
    }

    // Handle Tap to Start
    window.initExperience = function() {
        document.getElementById('start-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('start-screen').style.display = 'none', 400);
        hasStarted = true;
        
        if (playersReady === 2 && bitesQueue.length > 0) {
            playActivePlayer();
            triggerSlideEnter(0); // Start tracking the first slide
        }
    }

    // ==========================================================================
    // DOM SLIDE RENDERER & OBSERVER
    // ==========================================================================
    function renderDOMSlides() {
        const viewport = document.getElementById('bites-viewport');

        while (viewport.children.length < bitesQueue.length) {
            const index = viewport.children.length;
            const bite = bitesQueue[index];
            
            const slide = document.createElement('div');
            slide.className = 'bite-slide';
            slide.dataset.index = index;
            slide.onclick = () => togglePlayPause(); 

            // Removed the category badge for clean UI. Alignment handled by CSS.
            slide.innerHTML = `
                <div class="bite-ui-layer">
                    <div class="side-actions">
                        <div class="creator-pfp-wrap" onclick="event.stopPropagation()">
                            <img src="${bite.imgUrl}" class="creator-pfp">
                            <div class="follow-badge">+</div>
                        </div>
                        <div class="action-btn" id="like-btn-${index}" onclick="handleLike(event, ${index})">
                            <span class="material-icons-round">favorite</span>
                            <span class="count">${formatNumber(bite.likes)}</span>
                        </div>
                        <div class="action-btn" onclick="event.stopPropagation()">
                            <span class="material-icons-round">chat_bubble</span>
                            <span class="count">${formatNumber(bite.comments || Math.floor(bite.likes * 0.1))}</span>
                        </div>
                        <div class="action-btn" onclick="shareBite(event, ${index})">
                            <span class="material-icons-round">reply</span>
                            <span class="count">${formatNumber(bite.shares || 'Share')}</span>
                        </div>
                    </div>
                    <div class="bottom-info" onclick="event.stopPropagation()">
                        <div class="bite-author">${bite.author} <span class="material-icons-round" style="color:var(--accent); font-size:16px;">verified</span></div>
                        <div class="bite-desc">${bite.title}</div>
                    </div>
                </div>
            `;
            viewport.appendChild(slide);
        }
    }

    // Scroll Logic - The Leapfrog Engine
    function handleScroll() {
        if (!hasStarted) return;

        const viewport = document.getElementById('bites-viewport');
        const slideHeight = viewport.clientHeight;
        const scrollPosition = viewport.scrollTop;
        
        const newIndex = Math.round(scrollPosition / slideHeight);

        if (newIndex !== currentIndex && newIndex >= 0 && newIndex < bitesQueue.length) {
            
            // 1. Process leaving the old slide (Skip Penalty Logic)
            triggerSlideLeave(currentIndex);

            currentIndex = newIndex;
            
            // 2. Process entering the new slide (Deep Watch Logic)
            triggerSlideEnter(currentIndex);

            // 3. Manage RAM & Cache
            cleanUpQueueAndCache();
            swapPlayers();

            // 4. Aggressive Prefetch (When 5 slides remain)
            if (currentIndex >= bitesQueue.length - 5 && !isFetching) {
                if (!isSearchPlaying) fetchMoreBites(); 
            }
        }
    }

    // 🚀 ADVANCED TIME TRACKING: Entry
    function triggerSlideEnter(index) {
        const bite = bitesQueue[index];
        if(!bite) return;
        
        slideStartTime = Date.now();
        markAsViewed(bite.videoId);
        
        // Base View Point (+1)
        queueAlgorithmUpdate(bite.category, 1);

        clearTimeout(watchTimer);
        // Start 7-Second Deep Watch Timer
        if (!isSearchPlaying) {
            watchTimer = setTimeout(() => {
                // If they stayed for 7s, massive algorithm boost & extract hashtags
                queueAlgorithmUpdate(bite.category, 5);
                extractAndBoostHashtags(bite.title, 3); // Give extracted hashtags +3 points
            }, 7000);
        }
    }

    // 🚀 ADVANCED TIME TRACKING: Exit
    function triggerSlideLeave(index) {
        const timeSpent = Date.now() - slideStartTime;
        const bite = bitesQueue[index];
        clearTimeout(watchTimer); // Cancel deep watch if they left early
        
        if (timeSpent < 2500 && bite && !isSearchPlaying) {
            // SKIP PENALTY: User swiped away in under 2.5 seconds. Reduce points.
            queueAlgorithmUpdate(bite.category, -2);
        }
    }

    // 🚀 HASHTAG EXTRACTION ENGINE
    function extractAndBoostHashtags(text, points) {
        if (!text) return;
        // Regex finds all words starting with #, ignoring punctuation
        const matches = text.match(/#[\w\u0590-\u05ff\u0600-\u06ff\u0400-\u04ff\u0900-\u04ff\u4e00-\u9fff\u3400-\u4dbf]+/g);
        if (matches) {
            matches.forEach(tag => {
                const cleanTag = tag.slice(1).toLowerCase().trim(); // Remove the #
                if (cleanTag.length > 2) {
                    queueAlgorithmUpdate(cleanTag, points);
                }
            });
        }
    }

    // Memory Bank Update
    function markAsViewed(videoId) {
        if (!videoId || isSearchPlaying) return; 
        if (!bitesHistory.includes(videoId)) {
            bitesHistory.push(videoId);
            if (bitesHistory.length > 200) bitesHistory.shift(); 
            localStorage.setItem('goorac_bites_history', JSON.stringify(bitesHistory));
        }
    }

    // ==========================================================================
    // HARDWARE PLAYER MANAGEMENT
    // ==========================================================================
    function swapPlayers() {
        playerA.pauseVideo();
        playerB.pauseVideo();

        const pA = document.getElementById('player-container-a');
        const pB = document.getElementById('player-container-b');

        if (activePlayer === 'A') {
            activePlayer = 'B';
            pA.classList.remove('active');
            pB.classList.add('active');
            
            if(bitesQueue[currentIndex]) { playerB.loadVideoById(bitesQueue[currentIndex].videoId); playerB.playVideo(); }
            if(bitesQueue[currentIndex + 1]) { playerA.cueVideoById(bitesQueue[currentIndex + 1].videoId); }
        } else {
            activePlayer = 'A';
            pB.classList.remove('active');
            pA.classList.add('active');
            
            if(bitesQueue[currentIndex]) { playerA.loadVideoById(bitesQueue[currentIndex].videoId); playerA.playVideo(); }
            if(bitesQueue[currentIndex + 1]) { playerB.cueVideoById(bitesQueue[currentIndex + 1].videoId); }
        }
    }

    function playActivePlayer() {
        const p = activePlayer === 'A' ? playerA : playerB;
        if (bitesQueue[currentIndex]) { p.loadVideoById(bitesQueue[currentIndex].videoId); p.playVideo(); }
    }

    function togglePlayPause() {
        const p = activePlayer === 'A' ? playerA : playerB;
        const state = p.getPlayerState();
        const icon = document.getElementById('play-pause-icon');
        const inner = document.getElementById('pp-icon-inner');

        if (state === 1) { // Playing
            p.pauseVideo();
            inner.innerText = 'pause';
            icon.classList.add('show');
        } else {
            p.playVideo();
            inner.innerText = 'play_arrow';
            icon.classList.add('show');
            setTimeout(() => icon.classList.remove('show'), 800);
        }
    }

    // 🚀 LOOP DETECTION ALGORITHM
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            event.target.playVideo(); // Auto-loop
            
            // If they finish and rewatch it, that's a massive algorithm signal
            const currentBite = bitesQueue[currentIndex];
            if (currentBite && !isSearchPlaying) {
                queueAlgorithmUpdate(currentBite.category, 10);
                extractAndBoostHashtags(currentBite.title, 5); // Highly value these hashtags
            }
        }
    }

    // ==========================================================================
    // NETWORK LOGIC (With Pill & Retry Engine)
    // ==========================================================================
    async function fetchMoreBites(overrideTopic = null, attempt = 1) {
        if (isFetching) return;
        isFetching = true;

        const loadingPill = document.getElementById('feed-loading-pill');
        loadingPill.classList.add('show');

        let queryTopic = overrideTopic;
        if (!queryTopic || queryTopic === "tamil") {
            queryTopic = myInterests.length > 0 ? myInterests.join(',') : "tamil";
        }

        try {
            const res = await fetch(`https://pishaa.onrender.com/api/reels?topic=${encodeURIComponent(queryTopic)}`);
            const data = await res.json();
            
            if (data.success && data.bites.length > 0) {
                // Strict Deduplication against current session and 200 memory bank
                const newBites = data.bites.filter(b => !viewedVideoIds.has(b.videoId) && !bitesHistory.includes(b.videoId));
                
                newBites.forEach(b => {
                    viewedVideoIds.add(b.videoId);
                    bitesQueue.push(b);
                });

                renderDOMSlides();
                
                if (currentIndex === 0 && !hasStarted && playersReady === 2) {
                    playerA.cueVideoById(bitesQueue[0].videoId);
                    if(bitesQueue.length > 1) playerB.cueVideoById(bitesQueue[1].videoId);
                }
                
                loadingPill.classList.remove('show');
                isFetching = false;
            } else {
                throw new Error("Empty Array");
            }
        } catch (error) {
            console.error(`Fetch Attempt ${attempt} failed:`, error);
            if (attempt <= 2) {
                // Auto-Retry Engine
                loadingPill.querySelector('span').innerText = "Retrying connection...";
                isFetching = false; 
                setTimeout(() => fetchMoreBites(overrideTopic, attempt + 1), 1500);
            } else {
                loadingPill.querySelector('span').innerText = "Pull up to retry.";
                loadingPill.querySelector('.circular-loader').style.display = 'none';
                setTimeout(() => loadingPill.classList.remove('show'), 3000);
                isFetching = false;
            }
        }
    }

    function cleanUpQueueAndCache() {
        if (isSearchPlaying) return; 
        const cacheSlice = bitesQueue.slice(currentIndex);
        localStorage.setItem('goorac_bites_queue', JSON.stringify(cacheSlice.slice(0, 10))); 
    }

    // ==========================================================================
    // ALGORITHM DATA BATCHING ENGINE (Cost Optimization)
    // ==========================================================================
    window.handleLike = function(event, index) {
        event.stopPropagation(); 
        const btn = document.getElementById(`like-btn-${index}`);
        const bite = bitesQueue[index];
        
        if (!btn.classList.contains('liked')) {
            btn.classList.add('liked');
            let cSpan = btn.querySelector('.count');
            cSpan.innerText = formatNumber(bite.likes + 1);
            
            // Like = Massive Boost
            queueAlgorithmUpdate(bite.category, 15);
            extractAndBoostHashtags(bite.title, 8); // Extracted hashtags get massive boost
            
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
        }
    }

    // Accumulates scores in RAM instead of hammering Firestore
    function queueAlgorithmUpdate(tag, scoreChange) {
        if (!myUid || !tag || isSearchPlaying) return;
        const cleanTag = tag.toLowerCase().trim();
        
        if (!pendingAlgorithmUpdates[cleanTag]) {
            pendingAlgorithmUpdates[cleanTag] = 0;
        }
        pendingAlgorithmUpdates[cleanTag] += scoreChange;
    }

    // Flushes RAM to Firebase atomically
    function flushAlgorithmUpdates() {
        if (!myUid || Object.keys(pendingAlgorithmUpdates).length === 0) return;

        const dbUpdates = {};
        for (const [tag, score] of Object.entries(pendingAlgorithmUpdates)) {
            if (score !== 0) {
                dbUpdates[`interests.${tag}`] = firebase.firestore.FieldValue.increment(score);
            }
        }

        // Clear RAM immediately to prevent duplicate flushing
        pendingAlgorithmUpdates = {};

        // Single atomic write to Firebase
        db.collection("users").doc(myUid).set(dbUpdates, { merge: true }).catch(e => console.error("Batch Algo Flush Failed", e));
    }

    window.shareBite = function(event, index) {
        event.stopPropagation();
        const bite = bitesQueue[index];
        
        // Share = Massive Boost
        queueAlgorithmUpdate(bite.category, 20);
        
        if (navigator.share) {
            navigator.share({
                title: bite.title,
                text: `Check out this Bite on Goorac!`,
                url: `https://youtube.com/watch?v=${bite.videoId}`
            }).catch(e => {});
        }
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }

    // ==========================================================================
    // INSTAGRAM-STYLE DISCOVER MODAL
    // ==========================================================================
    window.openDiscoverModal = function() {
        document.getElementById('discover-modal').classList.add('active');
        history.pushState({ modal: 'discover' }, "", "#discover");
        
        const grid = document.getElementById('search-grid');
        if(grid.children.length <= 1) executeSearch("tamil");
    }

    window.closeDiscoverModal = function(shouldGoBack) {
        document.getElementById('discover-modal').classList.remove('active');
        if(shouldGoBack && window.location.hash === "#discover") history.back();
    }

    window.onpopstate = (e) => { 
        const hash = window.location.hash;

        if (isSearchPlaying && hash === '#discover') {
            isSearchPlaying = false;
            
            bitesQueue = [...backupQueue];
            currentIndex = backupIndex;
            
            const viewport = document.getElementById('bites-viewport');
            viewport.innerHTML = '';
            renderDOMSlides();
            
            viewport.scrollTop = currentIndex * viewport.clientHeight;
            
            if (activePlayer === 'A') {
                playerA.loadVideoById(bitesQueue[currentIndex].videoId);
                playerA.playVideo();
                if(bitesQueue[currentIndex+1]) playerB.cueVideoById(bitesQueue[currentIndex+1].videoId);
            } else {
                playerB.loadVideoById(bitesQueue[currentIndex].videoId);
                playerB.playVideo();
                if(bitesQueue[currentIndex+1]) playerA.cueVideoById(bitesQueue[currentIndex+1].videoId);
            }
            
            document.getElementById('discover-modal').classList.add('active');
            return;
        }

        if(document.getElementById('discover-modal').classList.contains('active') && hash !== '#discover') {
            closeDiscoverModal(false);
        }
    };

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const val = e.target.value.trim();
        searchTimeout = setTimeout(() => {
            if(val.length > 1) executeSearch(val);
        }, 600);
    });

    async function executeSearch(query) {
        const grid = document.getElementById('search-grid');
        
        let skelHtml = '';
        for(let i=0; i<12; i++) { skelHtml += `<div class="skel-grid-item"></div>`; }
        grid.innerHTML = skelHtml;

        try {
            const res = await fetch(`https://pishaa.onrender.com/api/reels?topic=${encodeURIComponent(query)}&search=true`);
            const data = await res.json();
            
            if (data.success && data.bites.length > 0) {
                grid.innerHTML = '';
                data.bites.forEach(bite => {
                    const el = document.createElement('div');
                    el.className = 'grid-item';
                    el.onclick = () => launchSearchResultFeed(bite, data.bites);
                    el.innerHTML = `
                        <img src="${bite.imgUrl}">
                        <div class="views-overlay"><span class="material-icons-round" style="font-size:14px;">play_arrow</span> ${formatNumber(bite.likes)}</div>
                    `;
                    grid.appendChild(el);
                });
            } else {
                grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #666;">No results found.</div>`;
            }
        } catch (error) {
            grid.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding: 50px 20px; color: #ff4444;">Connection failed.</div>`;
        }
    }

    function launchSearchResultFeed(clickedBite, allResults) {
        const searchInputBox = document.getElementById('search-input');
        if (searchInputBox && searchInputBox.value.trim()) {
            queueAlgorithmUpdate(searchInputBox.value.trim(), 20); // Search intent is highly valued
        }

        backupQueue = [...bitesQueue];
        backupIndex = currentIndex;
        isSearchPlaying = true;

        history.pushState({ modal: 'search-playing' }, "", "#search-playing");
        document.getElementById('discover-modal').classList.remove('active');
        
        const otherResults = allResults.filter(b => b.videoId !== clickedBite.videoId);
        bitesQueue = [clickedBite, ...otherResults];
        
        const viewport = document.getElementById('bites-viewport');
        viewport.innerHTML = '';
        currentIndex = 0;
        viewport.scrollTop = 0;
        viewedVideoIds.clear();

        renderDOMSlides();
        
        if (activePlayer === 'A') {
            playerA.loadVideoById(bitesQueue[0].videoId);
            playerA.playVideo();
            if(bitesQueue[1]) playerB.cueVideoById(bitesQueue[1].videoId);
        } else {
            playerB.loadVideoById(bitesQueue[0].videoId);
            playerB.playVideo();
            if(bitesQueue[1]) playerA.cueVideoById(bitesQueue[1].videoId);
        }
        
        triggerSlideEnter(0); // Start tracking the first search result
    }

</script>
