<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Quantum Bites</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           QUANTUM THEME & CSS VARIABLES
           ========================================================================== */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #00d2ff;
            --danger: #ff4444;
            --wiki-color: #e6e6e6;
            --reddit-color: #ff4500;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --nav-clearance: 130px; /* Prevents Bottom Nav overlap */
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            outline: none;
        }

        body {
            background-color: var(--bg); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; 
            overflow: hidden; 
            height: 100vh;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            padding: max(15px, env(safe-area-inset-top)) 20px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; pointer-events: none;
        }
        
        .header-title { 
            font-size: 1.6rem; font-weight: 900; letter-spacing: -1px;
            pointer-events: auto;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .search-icon-btn {
            color: #fff; font-size: 32px; cursor: pointer; pointer-events: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-icon-btn:active { transform: scale(0.8); color: var(--accent); }

        /* MAIN FEED CONTAINER */
        #bites-feed-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
            background: var(--bg);
        }
        #bites-feed-container::-webkit-scrollbar { display: none; }

        /* BITE CARD UI */
        .bite-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px; 
            padding-bottom: calc(var(--nav-clearance) + env(safe-area-inset-bottom));
            background-size: cover; background-position: center;
            background-color: #050505;
            border-bottom: 1px solid var(--border);
        }

        .bite-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 35%, rgba(0,0,0,0.1) 100%);
            z-index: 1; pointer-events: none;
        }
        
        .bite-content { 
            position: relative; z-index: 2; display: flex; 
            justify-content: space-between; align-items: flex-end; width: 100%; 
        }
        
        .bite-info { flex: 1; padding-right: 15px; animation: slideUp 0.5s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .source-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        
        .source-pfp { 
            width: 44px; height: 44px; border-radius: 14px; 
            background: var(--surface); object-fit: cover; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Dynamic colors for sources */
        .source-pfp.reddit { border: 2px solid var(--reddit-color); color: var(--reddit-color); }
        .source-pfp.wikipedia { border: 2px solid var(--wiki-color); color: var(--wiki-color); }
        
        .source-name { font-weight: 800; font-size: 1.1rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .bite-caption { 
            font-size: 1.05rem; line-height: 1.45; color: #ffffff; 
            margin-bottom: 15px; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
            overflow: hidden; text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .bite-tag { 
            background: rgba(255, 255, 255, 0.1); color: #fff; 
            padding: 6px 14px; border-radius: 10px; font-weight: 800; 
            display: inline-block; font-size: 0.75rem; border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(5px);
        }

        /* ACTIONS */
        .bite-actions { display: flex; flex-direction: column; gap: 28px; align-items: center; padding-bottom: 5px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #fff; cursor: pointer; transition: 0.2s; }
        .action-btn .material-icons-round { font-size: 38px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)); }
        .action-btn:active { transform: scale(0.7); }
        .action-btn.liked .material-icons-round { color: var(--danger); }
        .action-label { font-size: 0.75rem; font-weight: 800; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

        /* SEARCH MODAL */
        #search-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 10001;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateX(0); }
        
        .search-header {
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
            background: rgba(10,10,10,0.95); backdrop-filter: blur(15px);
        }
        .search-input {
            flex: 1; background: #111; border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 14px; color: white; outline: none; font-size: 16px;
        }
        .search-input:focus { border-color: var(--accent); }

        .search-results { flex: 1; overflow-y: auto; padding: 10px 0; background: var(--bg); }

        /* LOADING SPINNERS */
        .skeleton-card { background: #080808; animation: skelPulse 1.5s infinite; }
        @keyframes skelPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        .loading-spinner {
            text-align: center; padding: 40px; color: var(--accent); font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; animation: skelPulse 1s infinite;
        }

        main-navbar { position: relative; z-index: 10000; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="openSearch()">search</span>
</header>

<div id="bites-feed-container">
    <div class="bite-card skeleton-card"><div class="bite-overlay"></div></div>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round back-btn" onclick="closeSearch()">arrow_back</span>
        <input type="text" class="search-input" id="bite-search-box" placeholder="Search Reddit, Wiki, Universe..." autocomplete="off">
    </div>
    <div class="search-results" id="search-results-container">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;opacity:0.3;padding:40px;">
            <span class="material-icons-round" style="font-size:64px;margin-bottom:20px;">public</span>
            <p style="text-align:center;font-weight:800;letter-spacing:1px;">ACCESS THE ARCHIVES</p>
        </div>
    </div>
</div>

<script>
    // --- 1. FIREBASE INITIALIZATION ---
    if (typeof window.initFirebaseCore === 'function') {
        window.initFirebaseCore();
    } else if (!firebase.apps.length) {
        firebase.initializeApp(window.firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    // --- 2. QUANTUM STATE ---
    let myUid = null;
    let userInterests = {}; 
    let seenBites = new Set(); 
    let isFetching = false;
    let viewTimers = {}; 

    // YOUR NEW CUSTOM RENDER BACKEND URL
    const BACKEND_API_URL = "https://pishaa.onrender.com/api/feed";

    const DEFAULT_TOPICS = ["technology", "cricket", "science", "history"];

    // --- 3. PROFILE & ML SETUP ---
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            myUid = user.uid;
            await loadProfile();
            initEngine();
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadProfile() {
        try {
            const doc = await db.collection("users").doc(myUid).get();
            if(doc.exists && doc.data().bitesProfile) {
                userInterests = doc.data().bitesProfile;
            }
        } catch(e) { console.error("Profile Load Error", e); }
    }

    function trainAlgorithm(topic, points) {
        if (!myUid || !topic) return;
        const tag = topic.toLowerCase().trim();
        
        userInterests[tag] = (userInterests[tag] || 0) + points;
        db.collection("users").doc(myUid).update({
            [`bitesProfile.${tag}`]: firebase.firestore.FieldValue.increment(points)
        }).catch(() => {
            db.collection("users").doc(myUid).set({ bitesProfile: { [tag]: points } }, { merge: true });
        });
        
        console.log(`🤖 Quantum Engine: +${points} added to [${tag}]`);
    }

    // --- 4. THE RENDER BACKEND FETCHER ---
    async function fetchFromBackend(topic) {
        try {
            const url = `${BACKEND_API_URL}?topic=${encodeURIComponent(topic)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success && data.bites) {
                return data.bites; // Returns perfectly formatted Reddit + Wiki data
            }
            return [];
        } catch (error) {
            console.error(`Backend Sync Error for ${topic}:`, error);
            return [];
        }
    }

    // --- 5. THE FEED GENERATOR ---
    async function fetchNextBatch() {
        if (isFetching) return;
        isFetching = true;
        
        let topicsToFetch = [];
        let sorted = Object.entries(userInterests).sort((a,b) => b[1] - a[1]);
        
        if (sorted.length === 0) {
            topicsToFetch = DEFAULT_TOPICS.slice(0, 2);
        } else {
            topicsToFetch.push(sorted[0][0]);
            if (sorted[1]) topicsToFetch.push(sorted[1][0]);
            topicsToFetch.push(DEFAULT_TOPICS[Math.floor(Math.random() * DEFAULT_TOPICS.length)]);
        }

        // Fetch from your Render Backend simultaneously
        const promises = topicsToFetch.map(t => fetchFromBackend(t));
        const resArray = await Promise.all(promises);
        
        let freshBites = resArray.flat();
        freshBites = freshBites.filter(b => !seenBites.has(b.id));
        freshBites.forEach(b => seenBites.add(b.id));
        
        freshBites.sort(() => Math.random() - 0.5); // Shuffle Reddit & Wiki
        
        if(freshBites.length > 0) renderToDOM(freshBites);
        isFetching = false;
    }

    // --- 6. RENDER DATA TO UI ---
    function renderToDOM(bites) {
        const container = document.getElementById('bites-feed-container');
        if(container.querySelector('.skeleton-card')) container.innerHTML = '';

        bites.forEach((bite, index) => {
            const card = document.createElement('div');
            card.className = 'bite-card';
            card.style.backgroundImage = `url('${bite.imgUrl}')`;
            card.dataset.id = bite.id;
            card.dataset.category = bite.category;
            
            // Format specific UI elements based on if it's Reddit or Wikipedia
            const isWiki = bite.type === 'wikipedia';
            const initial = isWiki ? 'W' : 'r/';
            const sourceClass = isWiki ? 'wikipedia' : 'reddit';
            const displayTitle = isWiki ? bite.title : bite.title;

            card.innerHTML = `
                <div class="bite-overlay"></div>
                <div class="bite-content">
                    <div class="bite-info">
                        <div class="source-row">
                            <div class="source-pfp ${sourceClass}">${initial}</div>
                            <div class="source-details">
                                <span class="source-name">${bite.source}</span>
                            </div>
                        </div>
                        <div class="bite-caption">${displayTitle}</div>
                        <div class="bite-tag">#${bite.category.replace(/\s+/g, '')}</div>
                    </div>
                    <div class="bite-actions">
                        <div class="action-btn" onclick="handleLike(this, '${bite.category}')">
                            <span class="material-icons-round">favorite_border</span>
                            <span class="action-label">${bite.likes > 1000 ? (bite.likes/1000).toFixed(1)+'k' : bite.likes}</span>
                        </div>
                        <div class="action-btn" onclick="window.open('${bite.link}', '_blank')">
                            <span class="material-icons-round">open_in_new</span>
                            <span class="action-label">Open</span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
            
            mlWatcher.observe(card);

            if (index === bites.length - 2) scrollTrigger.observe(card);
        });
    }

    // --- 7. OBSERVERS ---
    const mlWatcher = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            const id = e.target.dataset.id;
            const cat = e.target.dataset.category;

            if (e.isIntersecting) {
                viewTimers[id] = setTimeout(() => {
                    trainAlgorithm(cat, 1); // 5s watch = +1
                }, 5000); 
            } else {
                clearTimeout(viewTimers[id]);
            }
        });
    }, { threshold: 0.8 }); 

    const scrollTrigger = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                scrollTrigger.unobserve(e.target);
                fetchNextBatch(); 
            }
        });
    }, { rootMargin: "0px 0px 800px 0px" });

    function initEngine() { fetchNextBatch(); }

    // --- 8. UI & SEARCH ---
    function handleLike(btnEl, category) {
        const icon = btnEl.querySelector('.material-icons-round');
        if (btnEl.classList.contains('liked')) {
            btnEl.classList.remove('liked');
            icon.innerText = 'favorite_border';
        } else {
            btnEl.classList.add('liked');
            icon.innerText = 'favorite';
            trainAlgorithm(category, 5); // Likes = +5
            if(navigator.vibrate) navigator.vibrate([30, 40]);
        }
    }

    function openSearch() {
        document.getElementById('search-modal').classList.add('active');
        document.getElementById('bite-search-box').focus();
    }

    function closeSearch() { document.getElementById('search-modal').classList.remove('active'); }

    document.getElementById('bite-search-box').addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if(query.length > 0) {
                trainAlgorithm(query, 10); // Search = +10 Points
                
                const container = document.getElementById('search-results-container');
                container.innerHTML = `<div class="loading-spinner">Querying Archives...</div>`;
                
                const results = await fetchFromBackend(query);
                container.innerHTML = '';
                
                if(results.length === 0) {
                    container.innerHTML = `<p style="text-align:center; padding:40px; color:grey;">No archives found for "${query}"</p>`;
                    return;
                }

                results.forEach(res => {
                    const card = document.createElement('div');
                    card.style.cssText = "display:flex; padding:15px 20px; border-bottom:1px solid #1a1a1a; gap:15px; align-items:center; cursor:pointer;";
                    card.onclick = () => {
                        closeSearch();
                        window.scrollTo(0,0);
                        renderToDOM([res]); 
                    };
                    
                    card.innerHTML = `
                        <img src="${res.imgUrl}" style="width:65px; height:65px; border-radius:12px; object-fit:cover; background:#111;">
                        <div style="flex:1;">
                            <div style="font-size:0.95rem; font-weight:700; color:#fff; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${res.title}</div>
                            <div style="font-size:0.75rem; color:var(--accent); margin-top:4px; font-weight:600;">${res.source}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }
    });
</script>

</body>
</html>
