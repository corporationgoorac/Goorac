<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Quantum Bites</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           CSS VARIABLES & GLOBAL STYLING
           ========================================================================== */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #00d2ff;
            --danger: #ff4444;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
            /* Navigation height reference to prevent overlap */
            --nav-bottom-height: 140px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        body {
            background-color: var(--bg); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* Lock body for smooth scroll-snapping */
            height: 100vh;
        }

        /* ==========================================================================
           HEADER NAVIGATION
           ========================================================================== */
        header {
            position: fixed; 
            top: 0; 
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: max(15px, env(safe-area-inset-top)) 20px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
            pointer-events: none; /* Allows scrolling through the gradient */
        }

        .header-title { 
            font-size: 1.5rem; 
            font-weight: 900; 
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
            pointer-events: auto;
        }

        .search-icon-btn {
            color: #fff; 
            font-size: 30px; 
            cursor: pointer; 
            pointer-events: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-icon-btn:active { 
            transform: scale(0.8); 
            color: var(--accent); 
        }

        /* ==========================================================================
           BITES FEED (Vertical Scroll Snapping)
           ========================================================================== */
        #bites-feed-container {
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory;
            scrollbar-width: none; 
            -ms-overflow-style: none;
            background: var(--bg);
        }

        #bites-feed-container::-webkit-scrollbar { 
            display: none; 
        }

        /* ==========================================================================
           BITE CARD COMPONENT
           ========================================================================== */
        .bite-card {
            height: 100vh; 
            width: 100vw;
            scroll-snap-align: start; 
            scroll-snap-stop: always;
            position: relative; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-end; 
            padding: 20px; 
            /* INCREASED PADDING TO PREVENT NAV BAR OVERLAP */
            padding-bottom: calc(var(--nav-bottom-height) + env(safe-area-inset-bottom));
            background-size: cover; 
            background-position: center;
            background-color: #050505;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.3s ease;
        }

        .bite-overlay {
            position: absolute; 
            inset: 0;
            background: linear-gradient(to top, 
                rgba(0,0,0,0.95) 0%, 
                rgba(0,0,0,0.4) 40%, 
                rgba(0,0,0,0.1) 100%);
            z-index: 1; 
            pointer-events: none;
        }
        
        .bite-content { 
            position: relative; 
            z-index: 2; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            width: 100%; 
        }
        
        .bite-info { 
            flex: 1; 
            padding-right: 15px; 
            animation: slideInLeft 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .source-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 12px; 
        }

        .source-pfp { 
            width: 42px; 
            height: 42px; 
            border-radius: 12px; 
            background: var(--surface); 
            object-fit: cover; 
            border: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 1.2rem; 
            color: var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .source-name { 
            font-weight: 800; 
            font-size: 1.05rem; 
            color: #fff; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .bite-time { 
            font-size: 0.75rem; 
            color: var(--text-dim); 
            font-weight: 600; 
            margin-top: 2px;
        }
        
        .bite-caption { 
            font-size: 1rem; 
            line-height: 1.4; 
            color: #f0f0f0; 
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .bite-tag { 
            background: rgba(0, 210, 255, 0.15); 
            color: var(--accent); 
            padding: 5px 12px; 
            border-radius: 12px; 
            font-weight: 700; 
            display: inline-block; 
            font-size: 0.75rem; 
            border: 1px solid rgba(0, 210, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        /* ==========================================================================
           INTERACTION BUTTONS (RIGHT SIDE)
           ========================================================================== */
        .bite-actions { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            align-items: center; 
            padding-bottom: 5px; 
            animation: slideInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-btn { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            color: #fff; 
            cursor: pointer; 
            transition: all 0.2s;
        }

        .action-btn .material-icons-round { 
            font-size: 36px; 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .action-btn:active .material-icons-round { 
            transform: scale(0.7); 
        }

        .action-btn.liked .material-icons-round { 
            color: var(--danger); 
            animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .action-label { 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.8); 
        }

        /* ==========================================================================
           SEARCH MODAL (Slide from Right)
           ========================================================================== */
        #search-modal {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: var(--surface); 
            z-index: 10001;
            transform: translateX(100%); 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; 
            flex-direction: column;
        }

        #search-modal.active { 
            transform: translateX(0); 
        }
        
        .search-header {
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(15px);
        }

        .back-btn { 
            color: #fff; 
            font-size: 28px; 
            cursor: pointer; 
        }

        .search-input-wrap { 
            flex: 1; 
            position: relative; 
        }

        .search-input {
            width: 100%; 
            background: #111; 
            border: 1px solid var(--border);
            padding: 14px 18px; 
            border-radius: 16px; 
            color: white; 
            outline: none;
            font-size: 16px; 
            transition: all 0.3s;
        }

        .search-input:focus { 
            border-color: var(--accent); 
            background: #151515; 
            box-shadow: 0 0 15px rgba(0,210,255,0.15); 
        }

        .search-results { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 0; 
            background: var(--bg); 
        }

        /* ==========================================================================
           SKELETON LOADING EFFECTS
           ========================================================================== */
        .skeleton-card { 
            background: #080808; 
            animation: quantumPulse 1.8s infinite ease-in-out; 
        }

        .skel-box { 
            background: #1a1a1a; 
            border-radius: 6px; 
        }

        @keyframes quantumPulse { 
            0%, 100% { opacity: 0.5; } 
            50% { opacity: 1; } 
        }
        
        .loading-spinner {
            text-align: center; 
            padding: 40px; 
            color: var(--accent); 
            font-weight: 800; 
            font-size: 0.9rem;
            text-transform: uppercase; 
            letter-spacing: 3px; 
            animation: quantumPulse 1s infinite;
        }

        /* Ensure navbar doesn't clip its own animations */
        main-navbar { 
            z-index: 10000; 
            position: relative; 
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="openSearch()">search</span>
</header>

<div id="bites-feed-container">
    <div class="bite-card skeleton-card">
        <div class="bite-overlay"></div>
        <div class="bite-content" style="opacity: 0.7;">
            <div class="bite-info">
                <div class="source-row">
                    <div class="source-pfp"></div>
                    <div class="source-details">
                        <div class="skel-box" style="width:120px; height:18px; margin-bottom:6px;"></div>
                        <div class="skel-box" style="width:70px; height:12px;"></div>
                    </div>
                </div>
                <div class="skel-box" style="width:95%; height:16px; margin-bottom:10px;"></div>
                <div class="skel-box" style="width:80%; height:16px; margin-bottom:10px;"></div>
                <div class="skel-box" style="width:60%; height:16px; margin-bottom:20px;"></div>
                <div class="skel-box" style="width:90px; height:24px; border-radius:12px;"></div>
            </div>
            <div class="bite-actions">
                <div class="skel-box" style="width:40px; height:40px; border-radius:50%;"></div>
                <div class="skel-box" style="width:40px; height:40px; border-radius:50%;"></div>
            </div>
        </div>
    </div>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round back-btn" onclick="closeSearch()">arrow_back</span>
        <div class="search-input-wrap">
            <input type="text" class="search-input" id="bite-search-box" placeholder="Explore topics, news, interests..." autocomplete="off">
        </div>
    </div>
    <div class="search-results" id="search-results-container">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.4; padding: 40px;">
            <span class="material-icons-round" style="font-size: 56px; margin-bottom:20px;">query_stats</span>
            <p style="text-align: center; font-size: 1rem; font-weight: 700;">Quantum Intelligence Active</p>
            <p style="text-align: center; font-size: 0.85rem; color: var(--text-dim);">Search results tune the feed algorithm.</p>
        </div>
    </div>
</div>

<script>
    /* --- 1. FIREBASE & STATE INITIALIZATION --- */
    if (typeof window.initFirebaseCore === 'function') {
        window.initFirebaseCore();
    } else if (!firebase.apps.length && window.firebaseConfig) {
        firebase.initializeApp(window.firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let myUid = null;
    let userInterests = {}; 
    let seenBites = new Set(); 
    let isFetching = false;
    let viewTimers = {}; 

    // Seed topics for variety
    const DEFAULT_TOPICS = ["world news", "technology", "sports", "science", "innovation"];

    /* --- 2. AUTHENTICATION & PROFILE LOADING --- */
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            myUid = user.uid;
            await loadMachineLearningProfile();
            initEngine();
        } else {
            window.location.href = "login.html";
        }
    });

    async function loadMachineLearningProfile() {
        try {
            const doc = await db.collection("users").doc(myUid).get();
            if(doc.exists && doc.data().bitesProfile) {
                userInterests = doc.data().bitesProfile;
            }
        } catch(e) { 
            console.error("ML Profile Error", e); 
        }
    }

    /* --- 3. THE MACHINE LEARNING SCORING SYSTEM --- */
    // Weights: Watch (5s) = +1, Like = +5, Search = +10
    function updateInterestScore(topic, points) {
        if (!myUid || !topic) return;
        const cleanTopic = topic.toLowerCase().trim();
        
        userInterests[cleanTopic] = (userInterests[cleanTopic] || 0) + points;
        
        // Push update to Firebase Firestore
        db.collection("users").doc(myUid).update({
            [`bitesProfile.${cleanTopic}`]: firebase.firestore.FieldValue.increment(points)
        }).catch(e => {
            // First time initialization
            db.collection("users").doc(myUid).set({ 
                bitesProfile: { [cleanTopic]: points } 
            }, { merge: true });
        });
        
        console.log(`🤖 Quantum ML: Recalibrated [${cleanTopic}] by +${points}`);
    }

    /* --- 4. THE INTERNET FETCHER (RSS-TO-JSON ENGINE) --- */
    // Uses Google News RSS via public API bridge to solve CORS
    async function fetchFromInternet(topic, limit = 12) {
        try {
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(topic)}&hl=en-IN&gl=IN&ceid=IN:en`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=`;

            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error(`Fetch status: ${response.status}`);
            
            const json = await response.json();
            if (json.status !== "ok") throw new Error("RSS data stream failure");

            // Filter out items without images for a visual feed
            let richBites = json.items.filter(item => 
                (item.enclosure && item.enclosure.link) || 
                (item.description && item.description.includes('<img'))
            );

            return richBites.slice(0, limit).map(b => {
                let imgUrl = b.enclosure && b.enclosure.link ? b.enclosure.link : '';
                if (!imgUrl && b.description) {
                    const imgMatch = b.description.match(/src="([^"]+)"/);
                    if (imgMatch) imgUrl = imgMatch[1];
                }

                return {
                    id: b.guid || Math.random().toString(36).substr(2, 9),
                    category: topic,
                    source: b.source || "Global Feed",
                    author: "QuantumNews",
                    title: b.title.split(' - ')[0], 
                    imgUrl: imgUrl || `https://picsum.photos/seed/${Math.random()}/1080/1920`, 
                    likes: Math.floor(Math.random() * 900) + 100,
                    timestamp: new Date(b.pubDate).getTime(),
                    link: b.link
                };
            });
        } catch(error) {
            console.warn(`Feed sync error: ${topic}`, error);
            return [];
        }
    }

    /* --- 5. THE FEED CONTROLLER (WEIGHTED BLEND) --- */
    async function fetchNextBatch() {
        if (isFetching) return;
        isFetching = true;
        
        let topicsToFetch = [];
        let interestsArr = Object.entries(userInterests).sort((a,b) => b[1] - a[1]);
        
        if (interestsArr.length === 0) {
            topicsToFetch = DEFAULT_TOPICS;
        } else {
            // Mix top interests with fresh exploration slots
            topicsToFetch.push(interestsArr[0][0]);
            if(interestsArr[1]) topicsToFetch.push(interestsArr[1][0]);
            topicsToFetch.push(DEFAULT_TOPICS[Math.floor(Math.random() * DEFAULT_TOPICS.length)]);
        }

        const fetchPromises = topicsToFetch.map(topic => fetchFromInternet(topic, 6));
        const resultsArray = await Promise.all(fetchPromises);
        
        let newBites = resultsArray.flat();
        newBites = newBites.filter(bite => {
            if (seenBites.has(bite.id)) return false;
            seenBites.add(bite.id);
            return true;
        });
        
        // Shuffle for natural content discovery
        newBites.sort(() => Math.random() - 0.5);
        
        if(newBites.length > 0) {
            appendBitesToDOM(newBites);
        }
        
        isFetching = false;
    }

    function formatTime(ms) {
        const diff = Date.now() - ms;
        const sec = Math.floor(diff / 1000);
        if (sec < 60) return "Just now";
        if (sec < 3600) return Math.floor(sec/60) + "m ago";
        if (sec < 86400) return Math.floor(sec/3600) + "h ago";
        return Math.floor(sec/86400) + "d ago";
    }

    /* --- 6. DOM RENDERING ENGINE --- */
    function appendBitesToDOM(bites) {
        const container = document.getElementById('bites-feed-container');
        
        // Remove initial skeleton on first real load
        if(container.querySelector('.skeleton-card')) {
            container.innerHTML = ''; 
        }

        bites.forEach((bite, index) => {
            const el = document.createElement('div');
            el.className = 'bite-card';
            el.style.backgroundImage = `url('${bite.imgUrl}')`;
            el.dataset.id = bite.id;
            el.dataset.category = bite.category;
            
            const firstChar = bite.source.charAt(0).toUpperCase();

            el.innerHTML = `
                <div class="bite-overlay"></div>
                <div class="bite-content">
                    <div class="bite-info">
                        <div class="source-row">
                            <div class="source-pfp">${firstChar}</div>
                            <div class="source-details">
                                <span class="source-name">${bite.source}</span>
                                <span class="bite-time">@${bite.author} • ${formatTime(bite.timestamp)}</span>
                            </div>
                        </div>
                        <div class="bite-caption">${bite.title}</div>
                        <div class="bite-tag">#${bite.category.replace(/\s+/g, '')}</div>
                    </div>
                    <div class="bite-actions">
                        <div class="action-btn" onclick="handleLike(this, '${bite.category}')">
                            <span class="material-icons-round">favorite_border</span>
                            <span class="action-label">${bite.likes}</span>
                        </div>
                        <div class="action-btn" onclick="openLink('${bite.link}')">
                            <span class="material-icons-round">open_in_browser</span>
                            <span class="action-label">Expand</span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(el);
            
            // Monitor for engagement
            mlObserver.observe(el);

            // Trigger infinite scroll load before end of list
            if (index === bites.length - 2) {
                infiniteScrollObserver.observe(el);
            }
        });

        /* CACHE REMOVED: Fresh feed on every visit as requested */
    }

    /* --- 7. QUANTUM OBSERVERS --- */
    
    // ML Watcher: If visible for 5s, user is interested
    const mlObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const biteId = entry.target.dataset.id;
            const category = entry.target.dataset.category;

            if (entry.isIntersecting) {
                viewTimers[biteId] = setTimeout(() => {
                    updateInterestScore(category, 1);
                }, 5000); 
            } else {
                clearTimeout(viewTimers[biteId]);
            }
        });
    }, { threshold: 0.8 }); 

    // Infinite Scroll Controller
    const infiniteScrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                infiniteScrollObserver.unobserve(entry.target);
                fetchNextBatch(); 
            }
        });
    }, { rootMargin: "0px 0px 1000px 0px" });

    function initEngine() {
        // Initial Fetch
        fetchNextBatch();
    }

    /* --- 8. UI INTERACTIONS & UTILS --- */
    function handleLike(btnEl, category) {
        const icon = btnEl.querySelector('.material-icons-round');
        
        if (btnEl.classList.contains('liked')) {
            btnEl.classList.remove('liked');
            icon.innerText = 'favorite_border';
        } else {
            btnEl.classList.add('liked');
            icon.innerText = 'favorite';
            // Massive signal boost for likes
            updateInterestScore(category, 5);
            if(navigator.vibrate) navigator.vibrate([40, 30]);
        }
    }

    function openLink(url) {
        if (url) window.open(url, '_blank');
    }

    function openSearch() {
        document.getElementById('search-modal').classList.add('active');
        document.getElementById('bite-search-box').focus();
        history.pushState({ searchOpen: true }, "", "#search");
    }

    function closeSearch() {
        document.getElementById('search-modal').classList.remove('active');
        if (window.location.hash === "#search") history.back();
    }

    window.addEventListener('popstate', () => {
        if (document.getElementById('search-modal').classList.contains('active')) {
            document.getElementById('search-modal').classList.remove('active');
        }
    });

    document.getElementById('bite-search-box').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if(query.length > 0) executeAlgorithmSearch(query);
        }
    });

    async function executeAlgorithmSearch(query) {
        const container = document.getElementById('search-results-container');
        container.innerHTML = `<div class="loading-spinner">Tuning Quantum Frequencies...</div>`;
        
        // Searches represent high intent: +10 Points
        updateInterestScore(query, 10);
        
        const results = await fetchFromInternet(query, 15);
        container.innerHTML = '';
        
        if(results.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding:40px;">Frequency blank for "${query}"</p>`;
            return;
        }

        results.forEach(res => {
            const card = document.createElement('div');
            card.style.cssText = "display:flex; padding:15px 20px; border-bottom:1px solid var(--border); gap:15px; align-items:center; cursor:pointer;";
            card.onclick = () => {
                closeSearch();
                window.scrollTo(0,0);
                appendBitesToDOM([res]); // Inject result to top of feed
            };
            
            card.innerHTML = `
                <img src="${res.imgUrl}" style="width:65px; height:65px; border-radius:12px; object-fit:cover; background:#111;">
                <div style="flex:1;">
                    <div style="font-size:0.95rem; font-weight:700; color:#fff; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${res.title}</div>
                    <div style="font-size:0.75rem; color:var(--accent); margin-top:4px; font-weight:600;">${res.source}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
