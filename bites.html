<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goorac | Quantum Bites</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="components/navbar.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons-Round" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           QUANTUM UI DESIGN SYSTEM
           ========================================================================== */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #00d2ff;
            --danger: #ff4444;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
            /* FIXED: Clearance for Bottom Navbar */
            --nav-bottom-clearance: 140px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            outline: none;
        }

        body {
            background-color: var(--bg); 
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; 
            overflow: hidden; /* Strict scroll-lock for snapping */
            height: 100vh;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: max(15px, env(safe-area-inset-top)) 20px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; pointer-events: none;
        }
        .header-title { 
            font-size: 1.6rem; font-weight: 900; letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); pointer-events: auto;
            color: var(--accent);
        }
        .search-icon-btn {
            color: #fff; font-size: 32px; cursor: pointer; pointer-events: auto;
            transition: transform 0.2s;
        }
        .search-icon-btn:active { transform: scale(0.8); }

        /* FEED CONTAINER */
        #bites-feed-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
            background: var(--bg);
        }
        #bites-feed-container::-webkit-scrollbar { display: none; }

        /* CARD COMPONENT */
        .bite-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 20px; 
            /* THE FIX: Padding prevents navbar from hiding text */
            padding-bottom: calc(var(--nav-bottom-clearance) + env(safe-area-inset-bottom));
            background-size: cover; background-position: center;
            background-color: #050505;
            border-bottom: 1px solid var(--border);
        }

        .bite-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.1) 100%);
            z-index: 1; pointer-events: none;
        }

        /* VIDEO PLAYER STYLING */
        .video-container {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 0; background: #000; display: none;
        }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .bite-card.playing .video-container { display: block; }
        
        .bite-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        
        .bite-info { flex: 1; padding-right: 15px; }
        .source-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .source-pfp { 
            width: 42px; height: 42px; border-radius: 12px; 
            background: var(--surface); display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--accent); border: 1px solid var(--border);
        }
        .source-name { font-weight: 800; font-size: 1.05rem; color: #fff; }
        
        .bite-caption { font-size: 1rem; line-height: 1.4; color: #f0f0f0; margin-bottom: 10px; font-weight: 500;}
        .bite-tag { 
            background: rgba(0, 210, 255, 0.1); color: var(--accent); 
            padding: 5px 12px; border-radius: 12px; font-weight: 700; 
            display: inline-block; font-size: 0.75rem; border: 1px solid rgba(0, 210, 255, 0.2);
        }

        /* ACTIONS */
        .bite-actions { display: flex; flex-direction: column; gap: 28px; align-items: center; padding-bottom: 5px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff; cursor: pointer; }
        .action-btn .material-icons-round { font-size: 38px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); transition: 0.2s; }
        .action-btn:active .material-icons-round { transform: scale(0.7); }
        .action-btn.liked .material-icons-round { color: var(--danger); }
        .action-label { font-size: 0.75rem; font-weight: 700; }

        /* MODAL */
        #search-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 10001;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateX(0); }
        .search-header {
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
        }
        .search-input {
            flex: 1; background: #111; border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 16px; color: white; font-size: 16px;
        }

        .loading-spinner { text-align: center; padding: 40px; color: var(--accent); font-weight: 800; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        main-navbar { z-index: 10000; position: relative; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Bites</div>
    <span class="material-icons-round search-icon-btn" onclick="openSearch()">search</span>
</header>

<div id="bites-feed-container">
    <div class="bite-card skeleton-card">
        <div class="bite-overlay"></div>
    </div>
</div>

<main-navbar></main-navbar>

<div id="search-modal">
    <div class="search-header">
        <span class="material-icons-round back-btn" onclick="closeSearch()">arrow_back</span>
        <input type="text" class="search-input" id="bite-search-box" placeholder="Search Tamil News & Videos..." autocomplete="off">
    </div>
    <div class="search-results" id="search-results-container"></div>
</div>

<script>
    // --- 1. QUANTUM INITIALIZATION ---
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let myUid = null;
    let userInterests = {}; 
    let seenBites = new Set(); 
    let isFetching = false;
    let viewTimers = {}; 

    // Seed Topics specifically for Tamil Content
    const DEFAULT_TOPICS = ["Tamil Nadu news", "Kollywood", "Chennai", "Tamil Cinema", "Tamil Tech"];

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            myUid = user.uid;
            await loadProfile();
            initEngine();
        } else window.location.href = "login.html";
    });

    async function loadProfile() {
        const doc = await db.collection("users").doc(myUid).get();
        if(doc.exists && doc.data().bitesProfile) userInterests = doc.data().bitesProfile;
    }

    function trainAlgorithm(topic, points) {
        if (!myUid || !topic) return;
        const tag = topic.toLowerCase().trim();
        userInterests[tag] = (userInterests[tag] || 0) + points;
        db.collection("users").doc(myUid).update({
            [`bitesProfile.${tag}`]: firebase.firestore.FieldValue.increment(points)
        }).catch(() => {
            db.collection("users").doc(myUid).set({ bitesProfile: { [tag]: points } }, { merge: true });
        });
        console.log(`🤖 Quantum Engine: ${tag} weight increased by ${points}`);
    }

    // --- 2. DUAL-ENGINE FETCHER (NEWS + VIDEOS) ---
    // Solves CORS using RSS Bridge and Embed workaround
    async function fetchBiteData(topic, limit = 10) {
        try {
            // Engine 1: Google News Tamil RSS
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(topic + " tamil")}&hl=ta-IN&gl=IN&ceid=IN:ta`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            
            const response = await fetch(apiUrl);
            const json = await response.json();
            if (json.status !== "ok") return [];

            return json.items.map(b => {
                let img = b.enclosure?.link || '';
                if (!img && b.description) {
                    const match = b.description.match(/src="([^"]+)"/);
                    if (match) img = match[1];
                }
                
                // Detection: Is it a video or article?
                const isVideo = b.link.includes('youtube.com') || b.link.includes('youtu.be');
                let embed = "";
                if (isVideo) {
                    const vidId = b.link.split('v=')[1] || b.link.split('/').pop();
                    embed = `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&loop=1`;
                }

                return {
                    id: b.guid || Math.random().toString(36).substr(2,9),
                    category: topic,
                    source: b.source || "Tamil Feed",
                    title: b.title.split(' - ')[0],
                    imgUrl: img || `https://picsum.photos/seed/${Math.random()}/1080/1920`,
                    likes: Math.floor(Math.random() * 500) + 100,
                    timestamp: new Date(b.pubDate).getTime(),
                    link: b.link,
                    videoUrl: embed
                };
            });
        } catch { return []; }
    }

    // --- 3. FEED CONTROLLER ---
    async function fetchNextBatch() {
        if (isFetching) return;
        isFetching = true;
        
        let topics = [];
        let sortedInts = Object.entries(userInterests).sort((a,b) => b[1] - a[1]);
        
        if (sortedInts.length === 0) topics = DEFAULT_TOPICS.slice(0, 3);
        else {
            topics.push(sortedInts[0][0]); 
            if(sortedInts[1]) topics.push(sortedInts[1][0]); 
            topics.push(DEFAULT_TOPICS[Math.floor(Math.random() * DEFAULT_TOPICS.length)]); 
        }

        const promises = topics.map(t => fetchBiteData(t, 5));
        const results = (await Promise.all(promises)).flat();
        
        const filtered = results.filter(b => !seenBites.has(b.id));
        filtered.forEach(b => seenBites.add(b.id));
        filtered.sort(() => Math.random() - 0.5);
        
        if(filtered.length > 0) renderBites(filtered);
        isFetching = false;
    }

    function renderBites(bites) {
        const container = document.getElementById('bites-feed-container');
        if(container.querySelector('.skeleton-card')) container.innerHTML = '';

        bites.forEach((b, i) => {
            const card = document.createElement('div');
            card.className = 'bite-card';
            card.style.backgroundImage = `url('${b.imgUrl}')`;
            card.dataset.id = b.id;
            card.dataset.category = b.category;
            
            // If it's a video, add the embed container
            let videoHtml = b.videoUrl ? `<div class="video-container"><iframe src="${b.videoUrl}" allow="autoplay; encrypted-media"></iframe></div>` : '';

            card.innerHTML = `
                ${videoHtml}
                <div class="bite-overlay"></div>
                <div class="bite-content">
                    <div class="bite-info">
                        <div class="source-row">
                            <div class="source-pfp">${b.source.charAt(0)}</div>
                            <span class="source-name">${b.source}</span>
                        </div>
                        <div class="bite-caption">${b.title}</div>
                        <div class="bite-tag">#${b.category.replace(/\s+/g, '')}</div>
                    </div>
                    <div class="bite-actions">
                        <div class="action-btn" onclick="handleLike(this, '${b.category}')">
                            <span class="material-icons-round">favorite_border</span>
                            <span class="action-label">${b.likes}</span>
                        </div>
                        <div class="action-btn" onclick="window.open('${b.link}', '_blank')">
                            <span class="material-icons-round">open_in_browser</span>
                            <span class="action-label">Open</span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
            mlObserver.observe(card);
            if (i === bites.length - 2) scrollTrigger.observe(card);
        });
    }

    // --- 4. QUANTUM OBSERVERS (ML ENGINE) ---
    // Linger Detection for Interest Auto-Learning
    const mlObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            const id = e.target.dataset.id;
            const cat = e.target.dataset.category;

            if (e.isIntersecting) {
                // If the card has a video, play it on entry
                if (e.target.querySelector('.video-container')) {
                    e.target.classList.add('playing');
                }
                
                // 5-Second Linger Rule
                viewTimers[id] = setTimeout(() => {
                    trainAlgorithm(cat, 1);
                }, 5000); 
            } else {
                e.target.classList.remove('playing');
                clearTimeout(viewTimers[id]);
            }
        });
    }, { threshold: 0.85 });

    const scrollTrigger = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                scrollTrigger.unobserve(e.target);
                fetchNextBatch();
            }
        });
    }, { rootMargin: "1000px" });

    function initEngine() {
        fetchNextBatch();
    }

    // --- 5. SEARCH & UI ---
    function handleLike(btn, cat) {
        btn.classList.toggle('liked');
        const icon = btn.querySelector('.material-icons-round');
        icon.innerText = btn.classList.contains('liked') ? 'favorite' : 'favorite_border';
        if(btn.classList.contains('liked')) trainAlgorithm(cat, 5); // Likes give +5 weight
    }

    function openSearch() {
        document.getElementById('search-modal').classList.add('active');
        document.getElementById('bite-search-box').focus();
    }

    function closeSearch() { document.getElementById('search-modal').classList.remove('active'); }

    document.getElementById('bite-search-box').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const q = e.target.value.trim();
            if(!q) return;
            trainAlgorithm(q, 10); // Search gives +10 weight
            const container = document.getElementById('search-results-container');
            container.innerHTML = '<div class="loading-spinner">Tuning Quantum Frequencies...</div>';
            
            const results = await fetchBiteData(q, 15);
            container.innerHTML = '';
            results.forEach(item => {
                const row = document.createElement('div');
                row.style.cssText = "display:flex; padding:15px 20px; border-bottom:1px solid #1a1a1a; gap:15px; align-items:center; cursor:pointer;";
                row.onclick = () => { closeSearch(); renderBites([item]); window.scrollTo(0,0); };
                row.innerHTML = `<img src="${item.imgUrl}" style="width:60px; height:60px; border-radius:12px; object-fit:cover;"><div style="flex:1;"><div style="font-weight:700; color:#fff;">${item.title}</div><div style="font-size:0.8rem; color:var(--accent);">${item.source}</div></div>`;
                container.appendChild(row);
            });
        }
    });

    window.onload = initEngine;
</script>

</body>
</html>
