<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Vision Session | Goorac</title>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://www.youtube.com/iframe_api"></script>

    <script src="components/presence.js" defer></script>
    <script src="components/call-notifier.js" defer></script>
    <script src="components/chatLoader.js" defer></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. CORE VARIABLES & RESET
           ========================================= */
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-glass: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff; /* Cinematic Cyan */
            --accent-glow: rgba(0, 210, 255, 0.4);
            --text: #ffffff;
            --text-dim: #888888;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 15px);
            --verified-color: #0095f6;
            --ease-out-back: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-spring: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none; outline: none;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100dvh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* =========================================
           2. NAVIGATION & TOP BAR
           ========================================= */
        .top-nav {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: calc(10px + var(--safe-top)) 20px 10px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }
        
        .back-btn {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; backdrop-filter: blur(10px);
            transition: 0.2s; pointer-events: auto;
        }
        .back-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
        
        .status-pill {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--accent);
            display: flex; align-items: center; gap: 6px; letter-spacing: 1px; font-weight: 700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .status-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; box-shadow: 0 0 8px currentColor; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* =========================================
           3. SCREEN MANAGER
           ========================================= */
        #session-view { position: relative; width: 100%; height: 100%; }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: scale(0.98); z-index: 10;
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        /* =========================================
           4. WAITING ROOM UI
           ========================================= */
        .session-avatars {
            display: flex; align-items: center; justify-content: center;
            gap: 45px; width: 100%; position: relative; margin-bottom: 40px;
        }
        
        .avatar-group { display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; z-index: 2; transition: 0.5s; }
        
        .s-bubble {
            width: 90px; height: 90px; border-radius: 50%;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111; border: 2px solid #222; transition: 0.3s;
        }
        .s-bubble img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        .s-bubble img.loaded { opacity: 1; }
        
        .avatar-group.them { opacity: 0.4; filter: grayscale(100%); transform: scale(0.9); }
        .avatar-group.them.active { opacity: 1; filter: grayscale(0%); transform: scale(1); }
        .avatar-group.them.active .s-bubble { border-color: var(--accent); box-shadow: 0 0 25px var(--accent-glow); }

        .u-name { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

        .s-line {
            position: absolute; height: 2px; width: 70px; background: #222;
            top: 45px; left: 50%; transform: translateX(-50%); z-index: 1; overflow: hidden;
        }
        .s-line::after {
            content:''; position: absolute; top:0; left:-100%; width:100%; height:100%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: flowLine 1.5s infinite linear; opacity: 0;
        }
        .s-line.connected { background: #333; }
        .s-line.connected::after { opacity: 1; }
        @keyframes flowLine { 0% { left: -100%; } 100% { left: 100%; } }

        /* =========================================
           5. ACTIVE VISION UI (PLAYER + CHAT)
           ========================================= */
        #screen-active { justify-content: flex-start; background: #000; }

        .video-container {
            width: 100%; height: 35vh; min-height: 250px; background: #050505;
            position: relative; z-index: 20; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }
        #yt-player-anchor { width: 100%; height: 100%; pointer-events: auto; }

        /* Cover block to prevent them from clicking YouTube logo/links if needed */
        .yt-blocker { position: absolute; top:0; left:0; width:100%; height:50px; z-index: 30; pointer-events: auto; }

        .turn-banner {
            width: 100%; background: var(--surface-glass); backdrop-filter: blur(10px);
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); z-index: 25; font-size: 13px; font-weight: 600;
        }
        
        .pick-btn {
            background: #fff; color: #000; padding: 6px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 800; border: none; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255,255,255,0.2); animation: pop 0.3s var(--ease-out-back);
        }
        .pick-btn:active { transform: scale(0.95); }
        @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }

        /* =========================================
           6. LIVE CHAT ENGINE
           ========================================= */
        .chat-section {
            flex: 1; width: 100%; display: flex; flex-direction: column;
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            position: relative; overflow: hidden;
        }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .chat-messages::-webkit-scrollbar { display: none; }

        /* Professional Live Chat Bubbles */
        .live-msg { display: flex; flex-direction: column; animation: slideInMsg 0.3s var(--ease-out-back); }
        @keyframes slideInMsg { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .live-msg.me { align-items: flex-end; }
        .live-msg.them { align-items: flex-flex-start; }

        .msg-sender { font-size: 10px; font-weight: 700; color: #666; margin-bottom: 3px; margin-left: 4px; text-transform: uppercase; }
        .me .msg-sender { display: none; }

        .msg-bubble {
            padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4;
            max-width: 80%; word-wrap: break-word; user-select: text; -webkit-user-select: text;
        }
        .me .msg-bubble { background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .them .msg-bubble { background: #222; color: #fff; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* Typing Indicator */
        .typing-box { display: none; padding: 10px 14px; background: transparent; align-items: center; gap: 4px; width: fit-content; }
        .dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: typeBounce 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: 0s; } .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typeBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

        /* Input Area */
        .chat-input-area {
            width: 100%; padding: 10px 15px calc(var(--safe-bottom) + 10px);
            background: rgba(10,10,10,0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 10px;
        }
        .chat-input {
            flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff;
            padding: 12px 16px; border-radius: 24px; font-size: 14px;
            outline: none; transition: 0.3s; max-height: 100px; resize: none;
            user-select: text; -webkit-user-select: text;
        }
        .chat-input:focus { border-color: var(--accent); background: #222; }
        
        .send-btn {
            width: 42px; height: 42px; border-radius: 50%; background: var(--accent);
            color: #000; border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transform: scale(0.8); transition: 0.3s var(--ease-out-back);
            pointer-events: none; flex-shrink: 0; margin-bottom: 2px;
        }
        .send-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        .send-btn span { font-size: 20px; margin-left: 2px; }

        /* =========================================
           7. SEARCH MODAL (FOR VIDEO PICKING)
           ========================================= */
        #search-modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 5000;
            transform: translateY(100%); transition: transform 0.4s var(--ease-spring);
            display: flex; flex-direction: column;
        }
        #search-modal.active { transform: translateY(0); }

        .search-header {
            padding: calc(var(--safe-top) + 15px) 20px 15px; background: #0a0a0a;
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border);
        }
        .search-input-box {
            flex: 1; background: #1a1a1a; border: 1px solid #333;
            padding: 14px 18px; border-radius: 16px; color: white; outline: none; font-size: 15px;
        }
        .search-input-box:focus { border-color: var(--accent); }

        .search-results { flex: 1; overflow-y: auto; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        
        .video-card {
            display: flex; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .video-card:active { background: #111; }
        .v-thumb { width: 120px; height: 68px; border-radius: 8px; object-fit: cover; background: #222; flex-shrink: 0; border: 1px solid #333; }
        .v-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .v-title { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .v-channel { font-size: 11px; color: var(--accent); font-weight: 700; }

        .loader-spinner { border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    </style>
</head>
<body>

    <div id="session-view">
        <div class="screen active" id="screen-waiting">
            <div class="top-nav">
                <div class="back-btn" onclick="handleExit()">
                    <span class="material-icons-round">close</span>
                </div>
            </div>

            <div class="session-avatars">
                <div class="s-line" id="connect-line"></div>
                
                <div class="avatar-group me">
                    <div class="s-bubble"><img id="my-pfp" src="" class="loaded"></div>
                    <div class="u-name">You</div>
                </div>

                <div class="avatar-group them" id="target-group">
                    <div class="s-bubble"><img id="target-pfp" src=""></div>
                    <div class="u-name" id="target-name">...</div>
                </div>
            </div>

            <h1 style="font-size:22px; font-family:'Orbitron'; font-weight:900; letter-spacing:1px; margin-bottom:5px;">VISION SYNC</h1>
            <p id="wait-sub" style="font-size:13px; color:#666;">Waiting for partner to join...</p>
        </div>

        <div class="screen" id="screen-active">
            <div class="top-nav" style="pointer-events: none;">
                <div class="status-pill"><div class="status-dot"></div> VISION LIVE</div>
                <div class="back-btn" onclick="handleExit()" style="background:rgba(0,0,0,0.8); pointer-events:auto;">
                    <span class="material-icons-round" style="color:#ff3b30; font-size: 22px;">power_settings_new</span>
                </div>
            </div>

            <div class="video-container" id="video-container">
                <div id="yt-player-anchor"></div>
                <div class="yt-blocker"></div>
            </div>

            <div class="turn-banner" id="turn-banner">
                <span id="turn-text">Connecting...</span>
                </div>

            <div class="chat-section">
                <div class="chat-messages" id="chat-messages">
                    </div>
                
                <div class="typing-box" id="typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>

                <div class="chat-input-area">
                    <textarea class="chat-input" id="chat-input" placeholder="Send a message..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendChat()">
                        <span class="material-icons-round">send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="search-modal">
        <div class="search-header">
            <span class="material-icons-round" style="color:#fff; cursor:pointer; font-size:32px;" onclick="closeSearchModal()">chevron_left</span>
            <input type="text" id="search-box" class="search-input-box" placeholder="Search YouTube or paste URL..." autocomplete="off">
        </div>
        <div class="search-results" id="search-results-list">
            <div style="text-align:center; padding:50px; color:#555;">
                <span class="material-icons-round" style="font-size:50px; margin-bottom:10px;">youtube_searched_for</span>
                <p>Search for any video to play for both.</p>
            </div>
        </div>
    </div>

    <script>
        // =================================================================
        // 1. CORE SETUP & VARIABLES
        // =================================================================
        if (typeof window.initFirebaseCore === 'function') window.initFirebaseCore();
        else if (!firebase.apps.length && window.firebaseConfig) firebase.initializeApp(window.firebaseConfig);

        const db = firebase.firestore();
        const rdb = firebase.database();
        const auth = firebase.auth();
        const urlParams = new URLSearchParams(window.location.search);
        const targetUsername = urlParams.get('user');

        let myUid = null;
        let targetUid = null;
        let roomId = null;
        let roomRef = null;       // Firestore (Turn state, video state)
        let syncRef = null;       // RTDB (Play/Pause physics)
        let chatRef = null;       // RTDB (Live Chat)
        
        let player = null;
        let isMyTurn = false;
        let currentVideoId = null;
        let ignoreSync = false;   // Prevents echo loops in Play/Pause
        let myProfile = null;
        let targetProfile = null;

        // Chat Variables
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('chat-messages');
        const typingInd = document.getElementById('typing-indicator');

        // =================================================================
        // 2. AUTH & INIT
        // =================================================================
        auth.onAuthStateChanged(async user => {
            if (!user) return window.location.href = 'login.html';
            myUid = user.uid;
            
            // Load My Profile
            const mDoc = await db.collection('users').doc(myUid).get();
            if(mDoc.exists) {
                myProfile = mDoc.data();
                document.getElementById('my-pfp').src = myProfile.photoURL || 'https://via.placeholder.com/150';
            }

            if (!targetUsername) return window.location.replace('visionLobby.html');

            // Load Target Profile (Check Cache First for Speed)
            const cachedTarget = localStorage.getItem(`pulse_cache_user_${targetUsername}`);
            if (cachedTarget) {
                targetProfile = JSON.parse(cachedTarget);
                setupTargetUI();
            }

            const tSnap = await db.collection('users').where('username', '==', targetUsername).limit(1).get();
            if(!tSnap.empty) {
                targetProfile = tSnap.docs[0].data();
                targetUid = tSnap.docs[0].id;
                localStorage.setItem(`pulse_cache_user_${targetUsername}`, JSON.stringify(targetProfile));
                setupTargetUI();
                initVisionSession();
            } else {
                alert("User not found.");
                handleExit();
            }
        });

        function setupTargetUI() {
            if(!targetProfile) return;
            const pfp = targetProfile.photoURL || 'https://via.placeholder.com/150';
            document.getElementById('target-pfp').src = pfp;
            document.getElementById('target-pfp').classList.add('loaded');
            document.getElementById('target-name').innerText = targetProfile.name.split(' ')[0];
        }

        // =================================================================
        // 3. ROOM STATE MACHINE (FIRESTORE)
        // =================================================================
        function initVisionSession() {
            roomId = [myUid, targetUid].sort().join('_');
            roomRef = db.collection('vision_rooms').doc(roomId);
            syncRef = rdb.ref(`vision_sync/${roomId}`);
            chatRef = rdb.ref(`vision_chat/${roomId}`);

            const myField = (myUid < targetUid) ? 'userA' : 'userB';
            const otherField = (myUid < targetUid) ? 'userB' : 'userA';

            // Set myself as Online
            roomRef.set({ 
                [myField]: 'online',
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(() => {
                roomRef.get().then(doc => {
                    const data = doc.data();
                    if (!doc.exists || !data.cycleStatus) {
                        // First one here initializes the room rules
                        const startingTurn = (myUid < targetUid) ? myUid : targetUid;
                        roomRef.set({ 
                            turn: startingTurn,                
                            cycleStatus: 'picking',
                            currentVideo: null
                        }, { merge: true });
                    }
                });
            });

            // Listen to Room Changes
            roomRef.onSnapshot(snap => {
                if (!snap.exists) return;
                const data = snap.data();

                // Check if other user is online
                if (data[otherField] === 'online') {
                    document.getElementById('target-group').classList.add('active');
                    document.getElementById('connect-line').classList.add('connected');
                    document.getElementById('wait-sub').innerText = "Link established.";
                    
                    if (!document.getElementById('screen-active').classList.contains('active')) {
                        setTimeout(() => {
                            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                            document.getElementById('screen-active').classList.add('active');
                            initChatEngine();
                        }, 800); // Small delay for visual effect
                    }
                    processCycle(data);
                } else {
                    // They left
                    document.getElementById('target-group').classList.remove('active');
                    document.getElementById('connect-line').classList.remove('connected');
                    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                    document.getElementById('screen-waiting').classList.add('active');
                    document.getElementById('wait-sub').innerText = "Partner disconnected.";
                    if (player) player.pauseVideo();
                }
            });
        }

        function processCycle(data) {
            isMyTurn = (data.turn === myUid);
            const status = data.cycleStatus;
            const banner = document.getElementById('turn-banner');

            if (status === 'picking') {
                if(player) { player.stopVideo(); document.getElementById('yt-player-anchor').style.opacity = 0; }
                
                if (isMyTurn) {
                    banner.innerHTML = `
                        <span style="color:var(--accent);">Your turn to pick a video</span>
                        <button class="pick-btn" onclick="openSearchModal()">SEARCH</button>
                    `;
                } else {
                    banner.innerHTML = `<span style="color:#888;">Waiting for ${targetProfile.name.split(' ')[0]} to pick...</span>`;
                }
            } 
            else if (status === 'playing' && data.currentVideo) {
                const vid = data.currentVideo;
                document.getElementById('yt-player-anchor').style.opacity = 1;
                
                if (isMyTurn) {
                    banner.innerHTML = `
                        <span style="color:#fff;">${vid.title.substring(0,30)}...</span>
                        <button class="pick-btn" onclick="swapTurn()" style="background:#222; color:#fff;">END TURN</button>
                    `;
                } else {
                    banner.innerHTML = `<span style="color:#fff;">${vid.title.substring(0,40)}...</span>`;
                }

                if (currentVideoId !== vid.id) {
                    currentVideoId = vid.id;
                    initYouTubePlayer(vid.id);
                }
            }
        }

        function swapTurn() {
            roomRef.update({
                turn: targetUid,
                cycleStatus: 'picking',
                currentVideo: firebase.firestore.FieldValue.delete()
            });
        }

        // =================================================================
        // 4. YOUTUBE QUANTUM SYNC ENGINE
        // =================================================================
        function initYouTubePlayer(vidId) {
            if (player) {
                // Ignore sync while loading new video
                ignoreSync = true;
                player.loadVideoById(vidId);
                setTimeout(() => ignoreSync = false, 1500);
            } else {
                player = new YT.Player('yt-player-anchor', {
                    videoId: vidId,
                    playerVars: { 
                        'autoplay': 1, 
                        'controls': 0, // Hides native controls (Rule: pause/play only)
                        'disablekb': 1, 
                        'fs': 0, 
                        'rel': 0,
                        'modestbranding': 1,
                        'playsinline': 1
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            }
        }

        function onPlayerReady(event) {
            // Listen to RTDB for Play/Pause commands from partner
            syncRef.child('playbackState').on('value', snap => {
                const stateObj = snap.val();
                if (!stateObj) return;

                // Don't react to our own broadcasts
                if (stateObj.updatedBy === myUid) return;

                // Lock outbound sync so we don't echo back
                ignoreSync = true;
                
                if (stateObj.state === YT.PlayerState.PLAYING) {
                    player.playVideo();
                } else if (stateObj.state === YT.PlayerState.PAUSED) {
                    player.pauseVideo();
                }

                // Unlock
                setTimeout(() => ignoreSync = false, 500);
            });
        }

        function onPlayerStateChange(event) {
            // Auto swap turn if video ends naturally
            if (event.data === YT.PlayerState.ENDED && isMyTurn) {
                swapTurn();
                return;
            }

            if (ignoreSync) return;

            // Broadcast Play/Pause
            if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
                syncRef.child('playbackState').set({
                    state: event.data,
                    updatedBy: myUid,
                    ts: Date.now()
                });
            }
        }

        // =================================================================
        // 5. SEARCH & VIDEO PICKER
        // =================================================================
        const searchInput = document.getElementById('search-box');
        let searchTimer = null;

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            const val = e.target.value.trim();
            if(!val) return document.getElementById('search-results-list').innerHTML = '';
            
            // Check for direct URL
            const urlRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = val.match(urlRegex);
            if (match && match[1]) {
                selectVideo(match[1], "Direct YouTube Link", "URL");
                return;
            }

            // Normal Search
            searchTimer = setTimeout(() => fetchResults(val), 800);
        });

        async function fetchResults(query) {
            const list = document.getElementById('search-results-list');
            list.innerHTML = '<div class="loader-spinner"></div>';
            try {
                // Uses the Render server we modified earlier to allow long videos
                const res = await fetch(`https://pishaa.onrender.com/api/feed?topics=${encodeURIComponent(query)}&mode=strict`);
                const data = await res.json();
                
                list.innerHTML = '';
                if(data.bites && data.bites.length > 0) {
                    data.bites.forEach(vid => {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.onclick = () => selectVideo(vid.videoId, vid.title, vid.author);
                        card.innerHTML = `
                            <img src="${vid.imgUrl}" class="v-thumb">
                            <div class="v-info">
                                <div class="v-title">${vid.title}</div>
                                <div class="v-channel">${vid.author || "YouTube"}</div>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                } else {
                    list.innerHTML = '<p style="text-align:center; padding:40px; color:#888;">No results found.</p>';
                }
            } catch(e) {
                list.innerHTML = '<p style="text-align:center; padding:40px; color:#ff3b30;">Search failed. Try again.</p>';
            }
        }

        function selectVideo(id, title, channel) {
            closeSearchModal();
            roomRef.update({
                cycleStatus: 'playing',
                currentVideo: { id, title, channel }
            });
        }

        function openSearchModal() {
            document.getElementById('search-modal').classList.add('active');
            history.pushState({modal: 'search'}, null, "");
            setTimeout(() => searchInput.focus(), 100);
        }

        function closeSearchModal() {
            document.getElementById('search-modal').classList.remove('active');
            searchInput.value = '';
            document.getElementById('search-results-list').innerHTML = '';
        }

        // =================================================================
        // 6. LIVE CHAT ENGINE (RTDB)
        // =================================================================
        let chatInitialized = false;

        function initChatEngine() {
            if(chatInitialized) return;
            chatInitialized = true;

            // Input Handling
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto'; 
                this.style.height = (this.scrollHeight) + 'px';
                if(this.value.trim().length > 0) {
                    sendBtn.classList.add('visible');
                    chatRef.child('typing').child(myUid).set(true);
                } else {
                    sendBtn.classList.remove('visible');
                    chatRef.child('typing').child(myUid).set(false);
                }
            });

            // Listen for Messages
            chatRef.child('messages').orderByChild('ts').limitToLast(50).on('child_added', snap => {
                const msg = snap.val();
                renderChatMsg(msg);
            });

            // Listen for Typing
            chatRef.child('typing').child(targetUid).on('value', snap => {
                typingInd.style.display = snap.val() ? 'flex' : 'none';
                scrollToChatBottom();
            });
        }

        function sendChat() {
            const text = chatInput.value.trim();
            if(!text) return;

            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.classList.remove('visible');
            chatRef.child('typing').child(myUid).set(false);
            chatInput.focus();

            chatRef.child('messages').push({
                text: text,
                sender: myUid,
                ts: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function renderChatMsg(msg) {
            const isMe = (msg.sender === myUid);
            const div = document.createElement('div');
            div.className = `live-msg ${isMe ? 'me' : 'them'}`;
            
            const name = isMe ? "You" : targetProfile.name.split(' ')[0];
            
            div.innerHTML = `
                <div class="msg-sender">${name}</div>
                <div class="msg-bubble">${escapeHTML(msg.text)}</div>
            `;
            
            messagesDiv.appendChild(div);
            scrollToChatBottom();
        }

        function scrollToChatBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        // =================================================================
        // 7. BACK BUTTON & CLEANUP
        // =================================================================
        window.addEventListener('popstate', (e) => {
            const searchMod = document.getElementById('search-modal');
            if(searchMod.classList.contains('active')) {
                closeSearchModal();
            } else if (!e.state) {
                // Browser back intended to leave page
                handleExit();
            }
        });

        function handleExit() {
            if (roomRef) {
                const myField = (myUid < targetUid) ? 'userA' : 'userB';
                roomRef.update({ [myField]: 'offline' }).catch(()=>{});
            }
            if (chatRef) chatRef.child('typing').child(myUid).set(false);
            window.location.replace('visionLobby.html');
        }

        window.addEventListener('beforeunload', () => {
            if (roomRef) {
                const myField = (myUid < targetUid) ? 'userA' : 'userB';
                roomRef.update({ [myField]: 'offline' });
            }
        });
    </script>
</body>
</html>
